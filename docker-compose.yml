services:
  easy_vpn:
    build:
      context: .                   # 项目根目录为构建上下文（多阶段构建需要同时访问 dashboard/ 和 server/）
      dockerfile: server/Dockerfile
    image: easy_vpn:latest
    container_name: easy_vpn
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"      # HTTP：只暴露给宿主机 Nginx，不对外直接开放
      - "0.0.0.0:2200-2299:2200-2299"  # TCP 隧道端口段：SSH 等直连，对外开放
    env_file:
      - .env
    volumes:
      - easy_vpn_data:/app/data        # 持久化隧道规则（rules.json）

networks:
  default:
    name: easy_vpn_net               # 独立网络，与 Gitea 等其他容器完全隔离

volumes:
  easy_vpn_data:
    name: easy_vpn_data
