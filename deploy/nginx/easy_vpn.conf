# easy_vpn Nginx 配置参考
# 部署到服务器时，复制到 /etc/nginx/sites-enabled/easy_vpn.conf
# 证书由 certbot 签发：certbot --nginx -d vpn.ruanpengpeng.cn

server {
    listen 80;
    server_name vpn.ruanpengpeng.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vpn.ruanpengpeng.cn;

    ssl_certificate /etc/letsencrypt/live/vpn.ruanpengpeng.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpn.ruanpengpeng.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 支持（隧道连接）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

